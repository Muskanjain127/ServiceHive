version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "3000:3000"
      - "5000:5000"
    environment:
      - PORT=3000
      - Mongodb_URL=${Mongo_url}
      - JWT_Secret=${JWT_Secret}     
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend